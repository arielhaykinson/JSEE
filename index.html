<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#f4f5f8; --surface:#ffffff; --surface-2:#fafbfc;
    --ink:#161726; --ink-soft:#5a5d72; --ink-faint:#9a9db3;
    --line:#e6e8ef; --line-strong:#d3d6e2;
    --primary:#3d4ef5; --primary-soft:#eceeffe0; --primary-ink:#2233c9;
    --accent:#f0a316;
    /* pipeline / status */
    --s-idea:#8a8fa8; --s-idea-bg:#eef0f5;
    --s-contacted:#c98a12; --s-contacted-bg:#fbf1dc;
    --s-confirmed:#1f9d6b; --s-confirmed-bg:#e2f5ec;
    --s-declined:#c0435a; --s-declined-bg:#fbe6ea;
    --s-done:#5a5d72; --s-done-bg:#eef0f5;
    --radius:14px; --radius-sm:9px;
    --shadow:0 1px 2px rgba(20,23,38,.04),0 8px 24px rgba(20,23,38,.06);
    --shadow-lg:0 12px 48px rgba(20,23,38,.18);
    --font:'Inter',system-ui,sans-serif; --display:'Space Grotesk',system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--font);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;font-size:14px;line-height:1.45}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select,textarea{font-family:inherit;font-size:14px;color:var(--ink)}

  .app{display:grid;grid-template-columns:230px 1fr;height:100vh;overflow:hidden}

  /* ---- sidebar ---- */
  .side{background:var(--ink);color:#c9cbe0;display:flex;flex-direction:column;padding:22px 16px}
  .brand{display:flex;flex-direction:column;gap:8px;padding:2px 4px 20px}
  .brand-plaque{background:#fff;border-radius:10px;padding:9px 12px;display:flex;justify-content:center;box-shadow:0 1px 3px rgba(0,0,0,.25)}
  .brand-plaque img{height:32px;width:auto;display:block}
  .brand-tag{font-size:11px;color:#8f92ac;font-weight:600;letter-spacing:.02em;padding-left:4px}
  .nav{display:flex;flex-direction:column;gap:2px;margin-top:6px}
  .nav button{display:flex;align-items:center;gap:11px;padding:10px 11px;border-radius:9px;color:#a6a9c4;font-weight:500;font-size:13.5px;text-align:left;transition:.13s}
  .nav button:hover{background:#22243a;color:#e6e7f2}
  .nav button.on{background:var(--primary);color:#fff}
  .nav button svg{width:17px;height:17px;flex:none}
  .side-foot{margin-top:auto;padding:12px 10px 4px;border-top:1px solid #2a2c44;font-size:11px;color:#7b7e99;line-height:1.5}
  .side-foot b{color:#a6a9c4;font-weight:600}

  /* ---- main ---- */
  .main{overflow:hidden;display:flex;flex-direction:column}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:20px 30px 16px;gap:16px}
  .topbar h2{font-family:var(--display);font-size:22px;font-weight:600;letter-spacing:-.02em}
  .topbar .sub{font-size:12.5px;color:var(--ink-soft);margin-top:2px}
  .content{flex:1;overflow-y:auto;padding:0 30px 40px}

  .btn{display:inline-flex;align-items:center;gap:7px;padding:9px 15px;border-radius:9px;font-weight:600;font-size:13px;transition:.13s;white-space:nowrap}
  .btn svg{width:15px;height:15px}
  .btn-primary{background:var(--primary);color:#fff}
  .btn-primary:hover{background:var(--primary-ink)}
  .btn-ghost{background:var(--surface);color:var(--ink);border:1px solid var(--line-strong)}
  .btn-ghost:hover{border-color:var(--ink-faint);background:var(--surface-2)}

  /* ---- calendar ---- */
  .cal-head{display:flex;align-items:center;gap:14px;margin-bottom:16px}
  .cal-nav{display:flex;align-items:center;gap:4px}
  .cal-nav button{width:32px;height:32px;border-radius:8px;border:1px solid var(--line-strong);background:var(--surface);display:grid;place-items:center;color:var(--ink-soft);transition:.13s}
  .cal-nav button:hover{background:var(--surface-2);color:var(--ink)}
  .cal-month{font-family:var(--display);font-size:18px;font-weight:600;min-width:180px}
  .cal-today{font-size:12.5px;font-weight:600;color:var(--primary);padding:6px 12px;border-radius:8px}
  .cal-today:hover{background:var(--primary-soft)}
  .legend{margin-left:auto;display:flex;gap:16px;font-size:12px;color:var(--ink-soft)}
  .legend i{display:inline-block;width:9px;height:9px;border-radius:3px;margin-right:6px;vertical-align:middle}

  .cal{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
  .cal-dow{display:grid;grid-template-columns:repeat(7,1fr);background:var(--surface-2);border-bottom:1px solid var(--line)}
  .cal-dow div{padding:10px 12px;font-size:11px;font-weight:600;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.05em}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);grid-auto-rows:1fr;min-height:560px}
  .cell{border-right:1px solid var(--line);border-bottom:1px solid var(--line);padding:8px;min-height:96px;position:relative;transition:.1s;cursor:pointer;display:flex;flex-direction:column;gap:4px}
  .cell:nth-child(7n){border-right:none}
  .cell:hover{background:var(--surface-2)}
  .cell.out{background:#fbfbfd}
  .cell.out .daynum{color:var(--ink-faint);opacity:.5}
  .daynum{font-size:12.5px;font-weight:600;color:var(--ink-soft);width:24px;height:24px;display:grid;place-items:center;border-radius:7px}
  .cell.today .daynum{background:var(--primary);color:#fff}
  .ev{font-size:11.5px;font-weight:600;padding:4px 7px;border-radius:6px;line-height:1.25;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;border-left:3px solid}
  .ev.speaker{background:var(--primary-soft);color:var(--primary-ink);border-color:var(--primary)}
  .ev.meeting{background:#eef7f1;color:#1f7d55;border-color:#2fae74}
  .ev.social{background:#fbf1dc;color:#a5720a;border-color:var(--accent)}
  .ev.exec{background:#efe9fb;color:#5d38b8;border-color:#7b52d6}
  .ev.done{opacity:.5;text-decoration:line-through}
  .cell .add-hint{position:absolute;top:8px;right:8px;color:var(--primary);opacity:0;font-size:16px;font-weight:700;transition:.1s}
  .cell:hover .add-hint{opacity:1}

  /* ---- pipeline ---- */
  .board{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;align-items:start}
  .col{background:var(--surface-2);border:1px solid var(--line);border-radius:var(--radius);padding:12px;min-height:200px;transition:.12s}
  .col.drag-over{background:var(--primary-soft);border-color:var(--primary)}
  .col-head{display:flex;align-items:center;justify-content:space-between;padding:2px 4px 12px;font-weight:600;font-size:12.5px;text-transform:uppercase;letter-spacing:.04em}
  .col-head .dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:7px}
  .col-head .n{background:var(--surface);border:1px solid var(--line-strong);color:var(--ink-soft);font-size:11px;padding:1px 7px;border-radius:20px;text-transform:none;letter-spacing:0}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-sm);padding:12px;margin-bottom:9px;box-shadow:0 1px 2px rgba(20,23,38,.04);cursor:grab;transition:.12s}
  .card:hover{border-color:var(--line-strong);box-shadow:var(--shadow)}
  .card.dragging{opacity:.4}
  .card h4{font-size:13.5px;font-weight:600;margin-bottom:2px}
  .card .org{font-size:12px;color:var(--ink-soft);margin-bottom:8px}
  .card .meta{display:flex;flex-wrap:wrap;gap:6px}
  .chip{font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:20px;background:var(--surface-2);color:var(--ink-soft);border:1px solid var(--line)}
  .chip.link{background:var(--primary-soft);color:var(--primary-ink);border-color:transparent}
  .col-add{width:100%;padding:9px;border:1px dashed var(--line-strong);border-radius:var(--radius-sm);color:var(--ink-faint);font-size:12.5px;font-weight:600;transition:.12s}
  .col-add:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-soft)}

  /* ---- list / agenda ---- */
  .agenda{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
  .arow{display:flex;align-items:center;gap:16px;padding:15px 20px;border-bottom:1px solid var(--line);cursor:pointer;transition:.1s}
  .arow:last-child{border-bottom:none}
  .arow:hover{background:var(--surface-2)}
  .adate{flex:none;width:52px;text-align:center}
  .adate .d{font-family:var(--display);font-size:20px;font-weight:600;line-height:1}
  .adate .m{font-size:10.5px;font-weight:600;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.05em}
  .ainfo{flex:1;min-width:0}
  .ainfo h4{font-size:14px;font-weight:600;margin-bottom:2px}
  .ainfo .line{font-size:12.5px;color:var(--ink-soft);display:flex;gap:10px;flex-wrap:wrap}
  .tag{flex:none;font-size:10.5px;font-weight:600;padding:3px 10px;border-radius:20px}
  .tag.speaker{background:var(--primary-soft);color:var(--primary-ink)}
  .tag.meeting{background:#eef7f1;color:#1f7d55}
  .tag.social{background:#fbf1dc;color:#a5720a}
  .tag.exec{background:#efe9fb;color:#5d38b8}
  .empty{text-align:center;padding:60px 20px;color:var(--ink-faint)}
  .empty svg{width:40px;height:40px;margin-bottom:12px;opacity:.5}

  /* ---- modal ---- */
  .scrim{position:fixed;inset:0;background:rgba(20,23,38,.42);backdrop-filter:blur(2px);display:none;align-items:flex-start;justify-content:center;padding:60px 20px;z-index:50;overflow-y:auto}
  .scrim.open{display:flex}
  .modal{background:var(--surface);border-radius:18px;box-shadow:var(--shadow-lg);width:100%;max-width:520px;overflow:hidden;animation:pop .16s ease}
  @keyframes pop{from{opacity:0;transform:translateY(8px) scale(.99)}to{opacity:1;transform:none}}
  .modal-head{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--line)}
  .modal-head h3{font-family:var(--display);font-size:17px;font-weight:600}
  .x{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;color:var(--ink-soft)}
  .x:hover{background:var(--surface-2);color:var(--ink)}
  .modal-body{padding:22px 24px;display:flex;flex-direction:column;gap:16px;max-height:60vh;overflow-y:auto}
  .field{display:flex;flex-direction:column;gap:6px}
  .field label{font-size:12px;font-weight:600;color:var(--ink-soft)}
  .field input,.field select,.field textarea{padding:10px 12px;border:1px solid var(--line-strong);border-radius:9px;background:var(--surface);transition:.12s;width:100%}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
  .field textarea{resize:vertical;min-height:64px}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .seg{display:flex;gap:6px;flex-wrap:wrap}
  .seg button{flex:1;min-width:calc(50% - 3px);padding:9px;border:1px solid var(--line-strong);border-radius:9px;font-weight:600;font-size:12.5px;color:var(--ink-soft);transition:.12s}
  .seg button.on{background:var(--primary);border-color:var(--primary);color:#fff}
  .checks{display:flex;flex-direction:column;gap:8px}
  .chk{display:flex;align-items:center;gap:10px;font-size:13px}
  .chk input{width:auto}
  .ai{display:flex;gap:8px;align-items:center}
  .ai input{flex:1}
  .ai button{flex:none;width:38px;height:38px;border-radius:9px;background:var(--primary-soft);color:var(--primary-ink);font-size:20px;font-weight:600;display:grid;place-items:center}
  .task{display:flex;align-items:center;gap:9px;padding:8px 10px;background:var(--surface-2);border:1px solid var(--line);border-radius:8px;font-size:13px}
  .task input[type=checkbox]{width:auto}
  .task.done span{text-decoration:line-through;color:var(--ink-faint)}
  .task .del{margin-left:auto;color:var(--ink-faint);font-size:16px}
  .task .del:hover{color:var(--s-declined)}
  .modal-foot{padding:16px 24px;border-top:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:10px}
  .link-del{color:var(--s-declined);font-weight:600;font-size:13px}
  .link-del:hover{text-decoration:underline}
  .link-del.armed{background:var(--s-declined-bg);padding:6px 12px;border-radius:8px;text-decoration:none}

  /* ---- avatars ---- */
  .av{display:inline-grid;place-items:center;border-radius:50%;color:#fff;font-weight:700;font-family:var(--display);flex:none;line-height:1}
  .av.av-none{background:var(--surface-2)!important;color:var(--ink-faint);border:1px dashed var(--line-strong);font-weight:600}

  /* ---- home summary strip ---- */
  .hstrip{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px}
  .hstat{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow)}
  .hstat .hn{font-family:var(--display);font-size:26px;font-weight:700;line-height:1}
  .hstat .hl{font-size:11.5px;color:var(--ink-soft);margin-top:6px;font-weight:500}
  .hstat.bad{background:var(--s-declined-bg);border-color:transparent}
  .hstat.bad .hn{color:var(--s-declined)}
  .hstat.warn{background:var(--s-contacted-bg);border-color:transparent}
  .hstat.warn .hn{color:var(--s-contacted)}
  .due{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;flex:none;text-transform:uppercase;letter-spacing:.03em}
  .due.overdue{background:var(--s-declined-bg);color:var(--s-declined)}
  .due.soon{background:var(--s-contacted-bg);color:var(--s-contacted)}
  .pill.clear{background:var(--s-confirmed-bg);color:var(--s-confirmed)}

  /* ---- board view ---- */
  .mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;align-items:start}
  .mcard{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
  .mcard.unassigned{border-style:dashed;background:var(--surface-2)}
  .mcard-head{display:flex;align-items:center;gap:12px;padding:16px 18px;border-bottom:1px solid var(--line)}
  .mcard-id{min-width:0;flex:1}
  .mcard-id h4{font-family:var(--display);font-size:15px;font-weight:600;line-height:1.2}
  .mcard-id span{font-size:12px;color:var(--ink-soft)}
  .mcard-counts{display:flex;gap:6px;flex:none}
  .madd{width:28px;height:28px;border-radius:8px;display:grid;place-items:center;color:var(--ink-soft);border:1px solid var(--line-strong);background:var(--surface);flex:none;transition:.12s}
  .madd:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-soft)}
  .madder{display:none;gap:8px;padding:10px 14px 4px;flex-wrap:wrap}
  .madder.open{display:flex}
  .madder .madder-text{flex:1;min-width:120px;padding:8px 10px;border:1px solid var(--line-strong);border-radius:8px}
  .madder .madder-cat{flex:none;padding:8px 8px;border:1px solid var(--line-strong);border-radius:8px;color:var(--ink-soft);font-size:12.5px;background:var(--surface)}
  .madder .madder-due{flex:none;padding:8px 8px;border:1px solid var(--line-strong);border-radius:8px;color:var(--ink-soft);font-size:12.5px}
  .madder input:focus,.madder select:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
  .catchip{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;flex:none}
  .madder-btn{flex:none;padding:0 14px;border-radius:8px;background:var(--primary);color:#fff;font-weight:600;font-size:12.5px}
  .madder-btn:hover{background:var(--primary-ink)}
  .pill{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px}
  .pill.open{background:var(--primary-soft);color:var(--primary-ink)}
  .pill.done{background:var(--s-confirmed-bg);color:var(--s-confirmed)}
  .mcard-body{padding:8px 10px 12px}
  .msec{padding:6px 8px}
  .msec-h{font-size:10.5px;font-weight:700;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.05em;padding:6px 6px 4px}
  .mrow{display:flex;align-items:center;gap:9px;padding:8px 8px;border-radius:8px;cursor:pointer;transition:.1s}
  .mrow:hover{background:var(--surface-2)}
  .mrow-t{font-size:13px;font-weight:500;flex:none;max-width:48%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .mrow-x{font-size:11.5px;color:var(--ink-faint);margin-left:auto;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .mrow-dot{width:8px;height:8px;border-radius:50%;flex:none}
  .mrow-check{width:18px;height:18px;display:grid;place-items:center;flex:none;border:none;background:none;padding:0;cursor:pointer}
  .mrow-check .ring{width:16px;height:16px;border-radius:50%;border:2px solid var(--line-strong);transition:.12s;position:relative}
  .mrow-check:hover .ring{border-color:var(--s-confirmed);background:var(--s-confirmed-bg)}
  .mrow-check:hover .ring::after{content:'';position:absolute;left:4px;top:1px;width:4px;height:8px;border:solid var(--s-confirmed);border-width:0 2px 2px 0;transform:rotate(45deg)}
  .mrow.task.is-done .mrow-t{text-decoration:line-through;color:var(--ink-faint)}
  .mnothing{font-size:12.5px;color:var(--ink-faint);padding:8px 14px 12px;font-style:italic}

  /* card top row (pipeline) */
  .card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}

  /* task owner select in event modal */
  .task .task-owner{margin-left:auto;font-size:11.5px;padding:4px 6px;border:1px solid var(--line-strong);border-radius:7px;background:var(--surface);color:var(--ink-soft);max-width:120px}
  .task .del{margin-left:0}

  /* member editor rows */
  .mledit{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line)}
  .mledit:last-child{border-bottom:none}
  .mledit-in{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .mledit-in input{padding:7px 10px;border:1px solid var(--line-strong);border-radius:8px}
  .mledit .del{width:30px;height:30px;border-radius:7px;display:grid;place-items:center;color:var(--ink-faint);flex:none}
  .mledit .del:hover{background:var(--s-declined-bg);color:var(--s-declined)}
  .mledit .del.armed{width:auto;padding:0 10px;font-size:11px;font-weight:700;background:var(--s-declined-bg);color:var(--s-declined)}

  /* ---- login gate ---- */
  .authgate{position:fixed;inset:0;z-index:100;background:var(--bg);display:none;align-items:center;justify-content:center;padding:24px}
  .authgate.open{display:flex}
  .authcard{background:var(--surface);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow-lg);width:100%;max-width:360px;padding:32px 28px;display:flex;flex-direction:column;gap:12px}
  .authcard h2{font-family:var(--display);font-size:24px;font-weight:700;text-align:center}
  .authcard p{font-size:13px;color:var(--ink-soft);text-align:center;margin-bottom:8px}
  .authcard input{padding:11px 13px;border:1px solid var(--line-strong);border-radius:10px;font-size:14px}
  .authcard input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
  .au-alt{color:var(--primary);font-weight:600;font-size:13px;padding:4px}
  .au-alt:hover{text-decoration:underline}
  .au-msg{font-size:12.5px;color:var(--ink-soft);text-align:center;min-height:16px}

  /* ---- toast ---- */
  #toast{position:fixed;left:50%;bottom:28px;transform:translate(-50%,20px);z-index:200;background:var(--ink);color:#fff;
    font-size:13px;font-weight:500;padding:11px 18px;border-radius:10px;box-shadow:var(--shadow-lg);opacity:0;pointer-events:none;transition:.2s}
  #toast.show{opacity:1;transform:translate(-50%,0)}

  /* ---- mobile bottom nav ---- */
  .mobilenav{display:none}

  @media(max-width:900px){
    .app{grid-template-columns:1fr}
    .side{display:none}
    .board{grid-template-columns:1fr 1fr}
    .hstrip{grid-template-columns:repeat(2,1fr)}
    .content{padding:0 16px 92px}.topbar{padding:16px}
    .mobilenav{display:grid;grid-template-columns:repeat(4,1fr);position:fixed;bottom:0;left:0;right:0;z-index:40;
      background:var(--surface);border-top:1px solid var(--line);padding:6px 4px;padding-bottom:calc(6px + env(safe-area-inset-bottom))}
    .mobilenav button{display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 2px;border-radius:10px;color:var(--ink-faint);font-size:10.5px;font-weight:600}
    .mobilenav button svg{width:21px;height:21px}
    .mobilenav button.on{color:var(--primary)}
  }
</style>
</head>

<script>
/* =========================================================================
   DATA LAYER — cache-backed, Supabase-synced.
   Reads serve from an in-memory cache (so all UI code stays synchronous).
   Writes update the cache + emit immediately, then persist to Supabase.
   Realtime keeps every officer's cache in sync. If Supabase isn't configured,
   it falls back to local demo mode so the app still runs.
   ------------------------------------------------------------------------
   >>> TO CONNECT YOUR OWN SHARED BACKEND, fill these two values:
   ========================================================================= */
const CONFIG = {
  url: 'https://tpyvtxvngstweboftlxe.supabase.co',   // Supabase → Project Settings → API → Project URL
  key: 'sb_publishable_gLCueBlPSPNbTihvQMZUTw_828Mt6bf' // Supabase → Project Settings → API → publishable key
};
const CONNECTED = !CONFIG.url.includes('YOUR-') && !CONFIG.key.includes('YOUR-');

let sb = null;                 // supabase client (set in boot)
let events=[], speakers=[], members=[], tasks=[];
let _id=1; const uid=()=>'x'+(_id++);
const emit=()=>document.dispatchEvent(new Event('store:change'));
function fail(err){ console.error(err); toast('Could not save — check your connection'); }

/* row <-> app-object mappers (DB uses snake_case; UI keeps its existing keys) */
const eventToRow  = e => ({title:e.title,type:e.type,event_date:e.date||null,time_str:e.time||null,location:e.location||null,notes:e.notes||null,status:e.status||'planning',tasks:e.tasks||[]});
const rowToEvent  = r => ({id:r.id,title:r.title,type:r.type,date:r.event_date,time:r.time_str,location:r.location,notes:r.notes,status:r.status,tasks:r.tasks||[]});
const speakerToRow= s => ({name:s.name,org:s.org,contact:s.contact,topics:s.topics,notes:s.notes,stage:s.stage,event_id:s.eventId||null,owner:s.owner||null});
const rowToSpeaker= r => ({id:r.id,name:r.name,org:r.org,contact:r.contact,topics:r.topics,notes:r.notes,stage:r.stage,eventId:r.event_id,owner:r.owner});
const memberToRow = m => ({name:m.name,role:m.role});
const rowToMember = r => ({id:r.id,name:r.name,role:r.role});
const taskToRow   = t => ({body:t.t,done:!!t.done,owner:t.owner||null,cat:t.cat||'general',due:t.due||null});
const rowToTask   = r => ({id:r.id,t:r.body,done:r.done,owner:r.owner,cat:r.cat,due:r.due});

async function loadAll(){
  const [ev,sp,me,ta] = await Promise.all([
    sb.from('events').select('*'),
    sb.from('speakers').select('*'),
    sb.from('members').select('*'),
    sb.from('tasks').select('*'),
  ]);
  if(ev.error||sp.error||me.error||ta.error){ fail(ev.error||sp.error||me.error||ta.error); return; }
  events   = (ev.data||[]).map(rowToEvent);
  speakers = (sp.data||[]).map(rowToSpeaker);
  members  = (me.data||[]).map(rowToMember);
  tasks    = (ta.data||[]).map(rowToTask);
}
let _rtSubscribed=false;
function subscribeRealtime(){
  if(_rtSubscribed) return; _rtSubscribed=true;
  ['events','speakers','members','tasks'].forEach(t=>{
    sb.channel('rt-'+t)
      .on('postgres_changes',{event:'*',schema:'public',table:t},async()=>{ await loadAll(); emit(); })
      .subscribe();
  });
}

const store = {
  // reads (from cache)
  events: () => [...events],
  speakers: () => [...speakers],
  members: () => [...members],
  tasks: () => [...tasks],
  event: id => events.find(e => e.id === id),
  speaker: id => speakers.find(s => s.id === id),
  member: id => members.find(mm => mm.id === id),
  task: id => tasks.find(t => t.id === id),
  eventsOn: iso => events.filter(e => e.date === iso),

  // event writes
  async addEvent(d){ const rec={tasks:[],status:'planning',...d};
    if(CONNECTED){ const {data,error}=await sb.from('events').insert(eventToRow(rec)).select().single();
      if(error) return fail(error); events.push(rowToEvent(data)); }
    else { events.push({id:uid(),...rec}); } emit(); },
  async updateEvent(id,d){ const e=store.event(id); if(!e) return; Object.assign(e,d); emit();
    if(CONNECTED){ const {error}=await sb.from('events').update(eventToRow(e)).eq('id',id); if(error) fail(error); } },
  async setEventTaskDone(eventId,taskIndex,done){ const e=store.event(eventId);
    if(!(e&&e.tasks&&e.tasks[taskIndex])) return; e.tasks[taskIndex].done=done; emit();
    if(CONNECTED){ const {error}=await sb.from('events').update({tasks:e.tasks}).eq('id',eventId); if(error) fail(error); } },
  async deleteEvent(id){ events=events.filter(e=>e.id!==id);
    speakers.forEach(s=>{ if(s.eventId===id) s.eventId=null; }); emit();
    if(CONNECTED){ await sb.from('events').delete().eq('id',id); await sb.from('speakers').update({event_id:null}).eq('event_id',id); } },

  // speaker writes
  async addSpeaker(d){ const rec={stage:'idea',...d};
    if(CONNECTED){ const {data,error}=await sb.from('speakers').insert(speakerToRow(rec)).select().single();
      if(error) return fail(error); speakers.push(rowToSpeaker(data)); }
    else { speakers.push({id:uid(),...rec}); } emit(); },
  async updateSpeaker(id,d){ const s=store.speaker(id); if(!s) return; Object.assign(s,d); emit();
    if(CONNECTED){ const {error}=await sb.from('speakers').update(speakerToRow(s)).eq('id',id); if(error) fail(error); } },
  async deleteSpeaker(id){ speakers=speakers.filter(s=>s.id!==id); emit();
    if(CONNECTED){ const {error}=await sb.from('speakers').delete().eq('id',id); if(error) fail(error); } },

  // member writes
  async addMember(d){ const rec={...d};
    if(CONNECTED){ const {data,error}=await sb.from('members').insert(memberToRow(rec)).select().single();
      if(error) return fail(error); members.push(rowToMember(data)); }
    else { members.push({id:uid(),...rec}); } emit(); },
  async updateMember(id,d){ const mm=store.member(id); if(!mm) return; Object.assign(mm,d); emit();
    if(CONNECTED){ const {error}=await sb.from('members').update(memberToRow(mm)).eq('id',id); if(error) fail(error); } },
  async deleteMember(id){ members=members.filter(mm=>mm.id!==id);
    const changedEvents=[];
    events.forEach(e=>{ let ch=false; (e.tasks||[]).forEach(t=>{ if(t.owner===id){t.owner=null;ch=true;} }); if(ch) changedEvents.push(e); });
    speakers.forEach(s=>{ if(s.owner===id) s.owner=null; });
    tasks.forEach(t=>{ if(t.owner===id) t.owner=null; });
    emit();
    if(CONNECTED){
      await sb.from('members').delete().eq('id',id);
      await sb.from('speakers').update({owner:null}).eq('owner',id);
      await sb.from('tasks').update({owner:null}).eq('owner',id);
      for(const e of changedEvents){ await sb.from('events').update({tasks:e.tasks}).eq('id',e.id); }
    } },

  // standalone task writes
  async addTask(d){ const rec={done:false,...d};
    if(CONNECTED){ const {data,error}=await sb.from('tasks').insert(taskToRow(rec)).select().single();
      if(error) return fail(error); tasks.push(rowToTask(data)); }
    else { tasks.push({id:uid(),...rec}); } emit(); },
  async updateTask(id,d){ const t=store.task(id); if(!t) return; Object.assign(t,d); emit();
    if(CONNECTED){ const {error}=await sb.from('tasks').update(taskToRow(t)).eq('id',id); if(error) fail(error); } },
  async deleteTask(id){ tasks=tasks.filter(t=>t.id!==id); emit();
    if(CONNECTED){ const {error}=await sb.from('tasks').delete().eq('id',id); if(error) fail(error); } }
};

/* helpers */
function isoOffset(days){ const d=new Date(); d.setDate(d.getDate()+days); return d.toISOString().slice(0,10); }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function fmtDate(iso){ if(!iso) return ''; const [y,m,d]=iso.split('-').map(Number);
  return new Date(y,m-1,d).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}); }
function fmtTime(t){ if(!t) return ''; let [h,m]=t.split(':').map(Number); const ap=h>=12?'PM':'AM'; h=h%12||12; return `${h}:${String(m).padStart(2,'0')} ${ap}`; }

const STAGES=[
  {key:'idea',label:'Idea',color:'var(--s-idea)'},
  {key:'contacted',label:'Contacted',color:'var(--s-contacted)'},
  {key:'confirmed',label:'Confirmed',color:'var(--s-confirmed)'},
  {key:'done',label:'Done',color:'var(--s-done)'},
];
const TYPES={speaker:'Speaker event',meeting:'Meeting',exec:'Exec board',social:'Social'};

const CATEGORIES=[
  {key:'general',   label:'General',    color:'#5a5d72',bg:'#eef0f5'},
  {key:'outreach',  label:'Outreach',   color:'#2233c9',bg:'#eceeff'},
  {key:'logistics', label:'Logistics',  color:'#5d38b8',bg:'#efe9fb'},
  {key:'finance',   label:'Finance',    color:'#1f7d55',bg:'#e2f5ec'},
  {key:'marketing', label:'Marketing',  color:'#a5720a',bg:'#fbf1dc'},
  {key:'membership',label:'Membership', color:'#0e7490',bg:'#dbeff5'},
];
function catInfo(key){ return CATEGORIES.find(c=>c.key===key); }
function catChip(key){ const c=catInfo(key); if(!c||c.key==='general') return '';
  return `<span class="catchip" style="background:${c.bg};color:${c.color}">${c.label}</span>`; }

/* =========================================================================
   VIEW LAYER
   ========================================================================= */
let view='home';
let calDate=new Date();

const $=(s,r=document)=>r.querySelector(s);
const el=(html)=>{const t=document.createElement('template');t.innerHTML=html.trim();return t.content.firstElementChild;};

const nav=$('#nav'), content=$('#content'), title=$('#title'), subtitle=$('#subtitle'), topActions=$('#topActions');

function setView(v){
  view=v;
  document.querySelectorAll('#nav button, #mobilenav button').forEach(btn=>btn.classList.toggle('on', btn.dataset.view===v));
  render();
}
nav.addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;setView(b.dataset.view);});
$('#mobilenav').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;setView(b.dataset.view);
  document.querySelector('.content').scrollTo(0,0);});

document.addEventListener('store:change',render);

function render(){
  if(view==='home') renderHome();
  else if(view==='calendar') renderCalendar();
  else if(view==='agenda') renderAgenda();
  else renderPipeline();
}

/* owner helpers */
function ownerName(id){ const mm=id&&store.member(id); return mm?mm.name:null; }
function initials(name){ return String(name||'?').trim().split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase(); }
function avatarColor(id){
  const palette=['#3d4ef5','#1f9d6b','#c98a12','#c0435a','#7b52d6','#0e8ea8','#d15f2a'];
  if(!id) return 'var(--ink-faint)';
  let h=0; for(const c of id) h=(h*31+c.charCodeAt(0))>>>0;
  return palette[h%palette.length];
}
function avatar(id,size=24){
  const nm=ownerName(id);
  if(!nm) return `<span class="av av-none" style="width:${size}px;height:${size}px;font-size:${size*0.42}px">–</span>`;
  return `<span class="av" title="${esc(nm)}" style="width:${size}px;height:${size}px;font-size:${size*0.38}px;background:${avatarColor(id)}">${esc(initials(nm))}</span>`;
}

/* ---------- Calendar ---------- */
function renderCalendar(){
  title.textContent='Calendar';
  subtitle.textContent='Everything JSEE, anchored to a date.';
  topActions.innerHTML='';
  topActions.appendChild(el(`<button class="btn btn-primary">${plusIcon()} New event</button>`))
    .onclick=()=>openEvent(null,todayISO());

  const y=calDate.getFullYear(), m=calDate.getMonth();
  const monthName=calDate.toLocaleDateString('en-US',{month:'long',year:'numeric'});
  const first=new Date(y,m,1), startDow=first.getDay();
  const daysInMonth=new Date(y,m+1,0).getDate();
  const prevDays=new Date(y,m,0).getDate();

  const wrap=el(`<div>
    <div class="cal-head">
      <div class="cal-nav">
        <button id="prev" aria-label="Previous month">${chev('l')}</button>
        <button id="next" aria-label="Next month">${chev('r')}</button>
      </div>
      <div class="cal-month">${monthName}</div>
      <button class="cal-today" id="jump">Today</button>
      <div class="legend">
        <span><i style="background:var(--primary)"></i>Speaker</span>
        <span><i style="background:#2fae74"></i>Meeting</span>
        <span><i style="background:#7b52d6"></i>Exec board</span>
        <span><i style="background:var(--accent)"></i>Social</span>
      </div>
    </div>
    <div class="cal">
      <div class="cal-dow">${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>`<div>${d}</div>`).join('')}</div>
      <div class="cal-grid" id="grid"></div>
    </div>
  </div>`);
  const grid=wrap.querySelector('#grid');

  const cells=[];
  for(let i=startDow-1;i>=0;i--) cells.push({day:prevDays-i,out:true,mo:m-1});
  for(let d=1;d<=daysInMonth;d++) cells.push({day:d,out:false,mo:m});
  while(cells.length%7!==0||cells.length<35) cells.push({day:cells.length-startDow-daysInMonth+1,out:true,mo:m+1});

  cells.forEach(c=>{
    const cy = c.mo<0?y-1 : c.mo>11?y+1 : y;
    const cm = (c.mo+12)%12;
    const iso=`${cy}-${String(cm+1).padStart(2,'0')}-${String(c.day).padStart(2,'0')}`;
    const isToday=iso===todayISO();
    const cell=el(`<div class="cell ${c.out?'out':''} ${isToday?'today':''}">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span class="daynum">${c.day}</span>
      </div>
      <span class="add-hint">+</span>
    </div>`);
    store.eventsOn(iso).sort((a,b)=>(a.time||'').localeCompare(b.time||'')).forEach(ev=>{
      const chip=el(`<div class="ev ${ev.type} ${ev.status==='done'?'done':''}" title="${esc(ev.title)}">${ev.time?fmtTime(ev.time)+' · ':''}${esc(ev.title)}</div>`);
      chip.onclick=(e)=>{e.stopPropagation();openEvent(ev.id);};
      cell.appendChild(chip);
    });
    cell.onclick=()=>openEvent(null,iso);
    grid.appendChild(cell);
  });

  wrap.querySelector('#prev').onclick=()=>{calDate=new Date(y,m-1,1);renderCalendar();};
  wrap.querySelector('#next').onclick=()=>{calDate=new Date(y,m+1,1);renderCalendar();};
  wrap.querySelector('#jump').onclick=()=>{calDate=new Date();renderCalendar();};

  content.innerHTML='';content.appendChild(wrap);
}

/* ---------- Agenda ---------- */
function renderAgenda(){
  title.textContent='Agenda';
  subtitle.textContent='Upcoming events and meetings, soonest first.';
  topActions.innerHTML='';
  topActions.appendChild(el(`<button class="btn btn-primary">${plusIcon()} New event</button>`))
    .onclick=()=>openEvent(null,todayISO());

  const up=store.events().filter(e=>e.date>=todayISO()).sort((a,b)=>a.date.localeCompare(b.date)||(a.time||'').localeCompare(b.time||''));
  const past=store.events().filter(e=>e.date<todayISO()).sort((a,b)=>b.date.localeCompare(a.date));

  content.innerHTML='';
  if(!up.length && !past.length){
    content.appendChild(el(`<div class="empty">${calIcon()}<div>No events yet. Click <b>New event</b> or drop one on the calendar.</div></div>`));
    return;
  }
  const list=el(`<div class="agenda"></div>`);
  const rowFor=(ev)=>{
    const sp=store.speakers().find(s=>s.eventId===ev.id);
    const openTasks=(ev.tasks||[]).filter(t=>!t.done).length;
    const [yy,mm,dd]=ev.date.split('-');
    const mAbbr=new Date(yy,mm-1,dd).toLocaleDateString('en-US',{month:'short'});
    const r=el(`<div class="arow">
      <div class="adate"><div class="d">${Number(dd)}</div><div class="m">${mAbbr}</div></div>
      <div class="ainfo">
        <h4>${esc(ev.title)}</h4>
        <div class="line">
          ${ev.time?`<span>${fmtTime(ev.time)}</span>`:''}
          ${ev.location?`<span>${esc(ev.location)}</span>`:''}
          ${sp?`<span>Speaker: ${esc(sp.name)}</span>`:''}
          ${openTasks?`<span>${openTasks} open task${openTasks>1?'s':''}</span>`:''}
        </div>
      </div>
      <span class="tag ${ev.type}">${TYPES[ev.type]}</span>
    </div>`);
    r.onclick=()=>openEvent(ev.id);
    return r;
  };
  up.forEach(e=>list.appendChild(rowFor(e)));
  if(past.length){
    list.appendChild(el(`<div style="padding:12px 20px;font-size:11px;font-weight:600;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.05em;background:var(--surface-2);border-bottom:1px solid var(--line)">Past</div>`));
    past.forEach(e=>{const r=rowFor(e);r.style.opacity='.62';list.appendChild(r);});
  }
  content.appendChild(list);
}

/* ---------- Pipeline (kanban) ---------- */
function renderPipeline(){
  title.textContent='Speaker pipeline';
  subtitle.textContent='Drag a speaker between stages as outreach moves along.';
  topActions.innerHTML='';
  topActions.appendChild(el(`<button class="btn btn-primary">${plusIcon()} Add speaker</button>`))
    .onclick=()=>openSpeaker(null,'idea');

  const board=el(`<div class="board"></div>`);
  STAGES.forEach(stage=>{
    const list=store.speakers().filter(s=>s.stage===stage.key);
    const col=el(`<div class="col" data-stage="${stage.key}">
      <div class="col-head"><span><span class="dot" style="background:${stage.color}"></span>${stage.label}</span><span class="n">${list.length}</span></div>
    </div>`);
    list.forEach(s=>{
      const ev=s.eventId?store.event(s.eventId):null;
      const card=el(`<div class="card" draggable="true" data-id="${s.id}">
        <div class="card-top"><h4>${esc(s.name)}</h4>${s.owner?avatar(s.owner,22):''}</div>
        <div class="org">${esc(s.org||'')}</div>
        <div class="meta">
          ${ev?`<span class="chip link">${fmtDate(ev.date)}</span>`:''}
          ${s.topics?`<span class="chip">${esc(s.topics.split(',')[0])}</span>`:''}
        </div>
      </div>`);
      card.onclick=()=>openSpeaker(s.id);
      card.addEventListener('dragstart',e=>{e.dataTransfer.setData('id',s.id);card.classList.add('dragging');});
      card.addEventListener('dragend',()=>card.classList.remove('dragging'));
      col.appendChild(card);
    });
    const add=el(`<button class="col-add">+ Add here</button>`);
    add.onclick=()=>openSpeaker(null,stage.key);
    col.appendChild(add);

    col.addEventListener('dragover',e=>{e.preventDefault();col.classList.add('drag-over');});
    col.addEventListener('dragleave',()=>col.classList.remove('drag-over'));
    col.addEventListener('drop',e=>{e.preventDefault();col.classList.remove('drag-over');
      const id=e.dataTransfer.getData('id');
      store.updateSpeaker(id,{stage:stage.key});});
    board.appendChild(col);
  });
  content.innerHTML='';content.appendChild(board);
}

/* ---------- Home (what's needed from each exec) ---------- */
function responsibilitiesFor(memberId){
  const tasks=[];
  store.events().forEach(ev=>{
    (ev.tasks||[]).forEach((t,i)=>{ if(t.owner===memberId) tasks.push({...t,event:ev,idx:i}); });
  });
  const owned=store.speakers().filter(s=>s.owner===memberId);
  return {tasks,owned};
}
function dueFlag(iso){
  if(!iso) return null;
  const days=Math.round((new Date(iso+'T00:00')-new Date(todayISO()+'T00:00'))/86400000);
  if(days<0) return {cls:'overdue',label:'overdue'};
  if(days===0) return {cls:'soon',label:'today'};
  if(days<=7) return {cls:'soon',label:`${days}d`};
  return null;
}
// unified list of OPEN to-dos (event action items + standalone tasks)
function openTodos(){
  const out=[];
  store.events().forEach(ev=>(ev.tasks||[]).forEach((t,i)=>{ if(!t.done) out.push({t:t.t,date:ev.date,owner:t.owner,kind:'event',event:ev,idx:i}); }));
  store.tasks().forEach(t=>{ if(!t.done) out.push({t:t.t,date:t.due||null,owner:t.owner,kind:'solo',cat:t.cat,task:t}); });
  return out;
}

function renderHome(){
  title.textContent='Home';
  subtitle.textContent="What's needed from each exec member.";
  topActions.innerHTML='';
  topActions.appendChild(el(`<button class="btn btn-ghost">${plusIcon()} Manage board</button>`))
    .onclick=()=>openMembers();

  const members=store.members();
  content.innerHTML='';

  // ---- summary strip ----
  const allOpen=openTodos();
  const overdue=allOpen.filter(t=>dueFlag(t.date)?.cls==='overdue').length;
  const soon=allOpen.filter(t=>dueFlag(t.date)?.cls==='soon').length;
  const upcoming=store.events().filter(e=>e.date>=todayISO()).length;
  const activeOutreach=store.speakers().filter(s=>s.stage==='idea'||s.stage==='contacted').length;

  const strip=el(`<div class="hstrip">
    <div class="hstat"><div class="hn">${allOpen.length}</div><div class="hl">Open action items</div></div>
    <div class="hstat ${overdue?'bad':''}"><div class="hn">${overdue}</div><div class="hl">Overdue</div></div>
    <div class="hstat ${soon?'warn':''}"><div class="hn">${soon}</div><div class="hl">Due within 7 days</div></div>
    <div class="hstat"><div class="hn">${upcoming}</div><div class="hl">Upcoming events</div></div>
    <div class="hstat"><div class="hn">${activeOutreach}</div><div class="hl">Speakers in outreach</div></div>
  </div>`);
  content.appendChild(strip);

  if(!members.length){
    content.appendChild(el(`<div class="empty">${peopleIcon()}<div>No board members yet. Click <b>Manage board</b> to add your officers.</div></div>`));
    return;
  }

  const grid=el(`<div class="mgrid"></div>`);

  const todoRow=(o)=>{
    const f=dueFlag(o.date);
    const rightLabel = o.kind==='event' ? `${esc(o.event.title)} · ${fmtDate(o.date)}` : (o.date?fmtDate(o.date):'personal task');
    const row=el(`<div class="mrow task">
      <button class="mrow-check" title="Mark done"><span class="ring"></span></button>
      <span class="mrow-t">${esc(o.t)}</span>
      ${o.kind==='solo'&&o.cat?catChip(o.cat):''}
      ${f?`<span class="due ${f.cls}">${f.label}</span>`:''}
      <span class="mrow-x">${rightLabel}</span>
    </div>`);
    row.querySelector('.mrow-check').onclick=(e)=>{
      e.stopPropagation();
      if(o.kind==='event') store.setEventTaskDone(o.event.id,o.idx,true);
      else store.updateTask(o.task.id,{done:true});
    };
    row.onclick=()=> o.kind==='event' ? openEvent(o.event.id) : openTask(o.task.id);
    return row;
  };

  const buildBody=(body,memberId,owned)=>{
    const todos=allOpen.filter(o=>o.owner===memberId);
    const activeOwned=(owned||[]).filter(s=>s.stage!=='done');
    if(activeOwned.length){
      const sec=el(`<div class="msec"><div class="msec-h">Leading outreach</div></div>`);
      activeOwned.forEach(s=>{
        const stg=STAGES.find(x=>x.key===s.stage);
        const row=el(`<div class="mrow speaker"><span class="mrow-dot" style="background:${stg?stg.color:'var(--ink-faint)'}"></span><span class="mrow-t">${esc(s.name)}</span><span class="mrow-x">${stg?stg.label:''}</span></div>`);
        row.onclick=()=>openSpeaker(s.id); sec.appendChild(row);
      });
      body.appendChild(sec);
    }
    if(todos.length){
      const sec=el(`<div class="msec"><div class="msec-h">To do</div></div>`);
      todos.sort((a,b)=>(a.date||'9999').localeCompare(b.date||'9999')).forEach(o=>sec.appendChild(todoRow(o)));
      body.appendChild(sec);
    }
    return todos.length+activeOwned.length;
  };

  members.forEach(mm=>{
    const {owned}=responsibilitiesFor(mm.id);
    const openCount=allOpen.filter(o=>o.owner===mm.id).length + owned.filter(s=>s.stage!=='done').length;
    const card=el(`<div class="mcard">
      <div class="mcard-head">
        <span class="av" style="width:40px;height:40px;font-size:15px;background:${avatarColor(mm.id)}">${esc(initials(mm.name))}</span>
        <div class="mcard-id"><h4>${esc(mm.name)}</h4><span>${esc(mm.role||'')}</span></div>
        <div class="mcard-counts">${openCount?`<span class="pill open">${openCount} to do</span>`:`<span class="pill clear">Clear</span>`}</div>
        <button class="madd" title="Add a task for ${esc(mm.name)}">${plusMini()}</button>
      </div>
      <div class="madder">
        <input class="madder-text" placeholder="Add a task…">
        <select class="madder-cat" title="Category">${CATEGORIES.map(c=>`<option value="${c.key}">${c.label}</option>`).join('')}</select>
        <input class="madder-due" type="date" title="Due by (optional)">
        <button class="madder-btn">Add</button>
      </div>
      <div class="mcard-body"></div>
    </div>`);
    const body=card.querySelector('.mcard-body');
    const n=buildBody(body,mm.id,owned);
    if(!n) body.appendChild(el(`<div class="mnothing">All clear — nothing outstanding.</div>`));

    // inline task adder
    const adder=card.querySelector('.madder');
    const input=adder.querySelector('.madder-text');
    const catInput=adder.querySelector('.madder-cat');
    const dueInput=adder.querySelector('.madder-due');
    card.querySelector('.madd').onclick=()=>{ adder.classList.toggle('open'); if(adder.classList.contains('open')) input.focus(); };
    const commit=()=>{ const v=input.value.trim(); if(!v) return; store.addTask({t:v,owner:mm.id,cat:catInput.value,due:dueInput.value||null}); /* re-render via emit */ };
    adder.querySelector('.madder-btn').onclick=commit;
    input.addEventListener('keydown',e=>{ if(e.key==='Enter'){e.preventDefault();commit();} if(e.key==='Escape'){adder.classList.remove('open');} });
    dueInput.addEventListener('keydown',e=>{ if(e.key==='Enter'){e.preventDefault();commit();} });

    grid.appendChild(card);
  });

  // ---- unassigned ----
  const unTodos=allOpen.filter(o=>!o.owner);
  const unSpeakers=store.speakers().filter(s=>!s.owner && s.stage!=='done');
  if(unTodos.length||unSpeakers.length){
    const card=el(`<div class="mcard unassigned">
      <div class="mcard-head">
        <span class="av av-none" style="width:40px;height:40px;font-size:15px">?</span>
        <div class="mcard-id"><h4>Unassigned</h4><span>Needs an owner</span></div>
        <div class="mcard-counts"><span class="pill open">${unTodos.length+unSpeakers.length} to do</span></div>
      </div>
      <div class="mcard-body"></div>
    </div>`);
    const body=card.querySelector('.mcard-body');
    if(unSpeakers.length){
      const sec=el(`<div class="msec"><div class="msec-h">Speakers</div></div>`);
      unSpeakers.forEach(s=>{
        const row=el(`<div class="mrow speaker"><span class="mrow-dot" style="background:var(--ink-faint)"></span><span class="mrow-t">${esc(s.name)}</span><span class="mrow-x">assign a point person</span></div>`);
        row.onclick=()=>openSpeaker(s.id); sec.appendChild(row);
      });
      body.appendChild(sec);
    }
    if(unTodos.length){
      const sec=el(`<div class="msec"><div class="msec-h">To do</div></div>`);
      unTodos.sort((a,b)=>(a.date||'9999').localeCompare(b.date||'9999')).forEach(o=>sec.appendChild(todoRow(o)));
      body.appendChild(sec);
    }
    grid.appendChild(card);
  }

  content.appendChild(grid);
}

/* =========================================================================
   MODALS

const scrim=$('#scrim'), mount=$('#modalMount');
function closeModal(){scrim.classList.remove('open');mount.innerHTML='';}
scrim.addEventListener('click',e=>{if(e.target===scrim)closeModal();});

/* ----- event modal ----- */
function openEvent(id,presetDate){
  const isNew=!id;
  const e=id?{...store.event(id),tasks:[...(store.event(id).tasks||[])]}:{title:'',type:'speaker',date:presetDate||todayISO(),time:'',location:'',notes:'',status:'planning',tasks:[]};
  const linkedSpeaker=store.speakers().find(s=>s.eventId===id);

  const m=el(`<div class="modal">
    <div class="modal-head"><h3>${isNew?'New event':'Edit event'}</h3><button class="x">${xIcon()}</button></div>
    <div class="modal-body">
      <div class="field"><label>Title</label><input id="f-title" placeholder="e.g. Founder fireside chat" value="${esc(e.title)}"></div>
      <div class="field"><label>Type</label>
        <div class="seg" id="f-type">
          ${Object.entries(TYPES).map(([k,v])=>`<button data-v="${k}" class="${e.type===k?'on':''}">${v}</button>`).join('')}
        </div>
      </div>
      <div class="row2">
        <div class="field"><label>Date</label><input type="date" id="f-date" value="${e.date}"></div>
        <div class="field"><label>Time</label><input type="time" id="f-time" value="${e.time||''}"></div>
      </div>
      <div class="field"><label>Location</label><input id="f-loc" placeholder="Room / building" value="${esc(e.location||'')}"></div>
      <div class="field"><label>Status</label>
        <select id="f-status">
          ${['planning','confirmed','done'].map(s=>`<option value="${s}" ${e.status===s?'selected':''}>${s[0].toUpperCase()+s.slice(1)}</option>`).join('')}
        </select>
      </div>
      <div class="field"><label>Notes</label><textarea id="f-notes" placeholder="Agenda, topics, logistics…">${esc(e.notes||'')}</textarea></div>
      <div class="field"><label>Action items</label>
        <div id="tasklist"></div>
        <div class="ai"><input id="f-task" placeholder="Add an action item…"><button id="addtask">+</button></div>
      </div>
      ${linkedSpeaker?`<div class="field"><label>Linked speaker</label><span class="chip link" style="align-self:flex-start">${esc(linkedSpeaker.name)}</span></div>`:''}
    </div>
    <div class="modal-foot">
      ${isNew?'<span></span>':'<button class="link-del" id="del">Delete event</button>'}
      <div style="display:flex;gap:8px;margin-left:auto">
        <button class="btn btn-ghost" id="cancel">Cancel</button>
        <button class="btn btn-primary" id="save">${isNew?'Create event':'Save changes'}</button>
      </div>
    </div>
  </div>`);

  // type seg
  m.querySelector('#f-type').addEventListener('click',ev=>{const b=ev.target.closest('button');if(!b)return;
    e.type=b.dataset.v;[...ev.currentTarget.children].forEach(c=>c.classList.toggle('on',c===b));});

  // tasks
  const taskList=m.querySelector('#tasklist');
  const memberOpts=(sel)=>`<option value="">Unassigned</option>`+store.members().map(mm=>`<option value="${mm.id}" ${sel===mm.id?'selected':''}>${esc(mm.name)}</option>`).join('');
  function drawTasks(){
    taskList.innerHTML='';
    e.tasks.forEach((t,i)=>{
      const row=el(`<div class="task ${t.done?'done':''}">
        <input type="checkbox" ${t.done?'checked':''}>
        <span>${esc(t.t)}</span>
        <select class="task-owner" title="Assign to">${memberOpts(t.owner)}</select>
        <button class="del">${xIcon(14)}</button>
      </div>`);
      row.querySelector('input[type=checkbox]').onchange=ev=>{e.tasks[i].done=ev.target.checked;drawTasks();};
      row.querySelector('.task-owner').onchange=ev=>{e.tasks[i].owner=ev.target.value||null;};
      row.querySelector('.del').onclick=()=>{e.tasks.splice(i,1);drawTasks();};
      taskList.appendChild(row);
    });
  }
  drawTasks();
  const taskInput=m.querySelector('#f-task');
  const addTask=()=>{const v=taskInput.value.trim();if(!v)return;e.tasks.push({t:v,done:false,owner:null});taskInput.value='';drawTasks();taskInput.focus();};
  m.querySelector('#addtask').onclick=addTask;
  taskInput.addEventListener('keydown',ev=>{if(ev.key==='Enter'){ev.preventDefault();addTask();}});

  m.querySelector('.x').onclick=closeModal;
  m.querySelector('#cancel').onclick=closeModal;
  if(!isNew){
    const db=m.querySelector('#del'); let armed=false,t;
    db.onclick=()=>{
      if(!armed){armed=true;db.textContent='Click again to delete';db.classList.add('armed');
        t=setTimeout(()=>{armed=false;db.textContent='Delete event';db.classList.remove('armed');},3000);return;}
      clearTimeout(t);store.deleteEvent(id);closeModal();
    };
  }

  m.querySelector('#save').onclick=()=>{
    const data={
      title:m.querySelector('#f-title').value.trim()||'Untitled event',
      type:e.type,
      date:m.querySelector('#f-date').value,
      time:m.querySelector('#f-time').value,
      location:m.querySelector('#f-loc').value.trim(),
      status:m.querySelector('#f-status').value,
      notes:m.querySelector('#f-notes').value.trim(),
      tasks:e.tasks,
    };
    if(isNew) store.addEvent(data); else store.updateEvent(id,data);
    closeModal();
  };

  mount.innerHTML='';mount.appendChild(m);scrim.classList.add('open');
  setTimeout(()=>m.querySelector('#f-title').focus(),40);
}

/* ----- speaker modal ----- */
function openSpeaker(id,presetStage){
  const isNew=!id;
  const s=id?{...store.speaker(id)}:{name:'',org:'',contact:'',topics:'',notes:'',stage:presetStage||'idea',eventId:null,owner:null};
  const events=store.events().sort((a,b)=>a.date.localeCompare(b.date));

  const m=el(`<div class="modal">
    <div class="modal-head"><h3>${isNew?'Add speaker':'Edit speaker'}</h3><button class="x">${xIcon()}</button></div>
    <div class="modal-body">
      <div class="row2">
        <div class="field"><label>Name</label><input id="s-name" placeholder="Full name" value="${esc(s.name)}"></div>
        <div class="field"><label>Org / title</label><input id="s-org" placeholder="Company or role" value="${esc(s.org||'')}"></div>
      </div>
      <div class="field"><label>Contact</label><input id="s-contact" placeholder="Email, LinkedIn, or how you reached them" value="${esc(s.contact||'')}"></div>
      <div class="row2">
        <div class="field"><label>Outreach stage</label>
          <select id="s-stage">
            ${STAGES.map(st=>`<option value="${st.key}" ${s.stage===st.key?'selected':''}>${st.label}</option>`).join('')}
          </select>
        </div>
        <div class="field"><label>Point person</label>
          <select id="s-owner">
            <option value="">Unassigned</option>
            ${store.members().map(mm=>`<option value="${mm.id}" ${s.owner===mm.id?'selected':''}>${esc(mm.name)}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="field"><label>Suggested topics</label><input id="s-topics" placeholder="Comma-separated" value="${esc(s.topics||'')}"></div>
      <div class="field"><label>Link to event</label>
        <select id="s-event">
          <option value="">— not tied to an event yet —</option>
          ${events.map(ev=>`<option value="${ev.id}" ${s.eventId===ev.id?'selected':''}>${esc(ev.title)} · ${fmtDate(ev.date)}</option>`).join('')}
        </select>
      </div>
      <div class="field"><label>Notes</label><textarea id="s-notes" placeholder="Context, follow-ups, who introduced them…">${esc(s.notes||'')}</textarea></div>
    </div>
    <div class="modal-foot">
      ${isNew?'<span></span>':'<button class="link-del" id="sdel">Remove speaker</button>'}
      <div style="display:flex;gap:8px;margin-left:auto">
        <button class="btn btn-ghost" id="scancel">Cancel</button>
        <button class="btn btn-primary" id="ssave">${isNew?'Add speaker':'Save changes'}</button>
      </div>
    </div>
  </div>`);

  m.querySelector('.x').onclick=closeModal;
  m.querySelector('#scancel').onclick=closeModal;
  if(!isNew){
    const db=m.querySelector('#sdel'); let armed=false,t;
    db.onclick=()=>{
      if(!armed){armed=true;db.textContent='Click again to remove';db.classList.add('armed');
        t=setTimeout(()=>{armed=false;db.textContent='Remove speaker';db.classList.remove('armed');},3000);return;}
      clearTimeout(t);store.deleteSpeaker(id);closeModal();
    };
  }

  m.querySelector('#ssave').onclick=()=>{
    const data={
      name:m.querySelector('#s-name').value.trim()||'Unnamed',
      org:m.querySelector('#s-org').value.trim(),
      contact:m.querySelector('#s-contact').value.trim(),
      stage:m.querySelector('#s-stage').value,
      owner:m.querySelector('#s-owner').value||null,
      topics:m.querySelector('#s-topics').value.trim(),
      eventId:m.querySelector('#s-event').value||null,
      notes:m.querySelector('#s-notes').value.trim(),
    };
    if(isNew) store.addSpeaker(data); else store.updateSpeaker(id,data);
    closeModal();
  };

  mount.innerHTML='';mount.appendChild(m);scrim.classList.add('open');
  setTimeout(()=>m.querySelector('#s-name').focus(),40);
}

/* ----- board members modal ----- */
function openMembers(){
  const m=el(`<div class="modal">
    <div class="modal-head"><h3>Board members</h3><button class="x">${xIcon()}</button></div>
    <div class="modal-body">
      <div class="field"><label>Add a member</label>
        <div class="row2">
          <input id="m-name" placeholder="Name">
          <input id="m-role" placeholder="Role (e.g. VP of Events)">
        </div>
        <button class="btn btn-primary" id="m-add" style="align-self:flex-start;margin-top:4px">${plusIcon()} Add member</button>
      </div>
      <div class="field"><label>Current board</label><div id="m-list"></div></div>
    </div>
    <div class="modal-foot"><div style="margin-left:auto"><button class="btn btn-primary" id="m-done">Done</button></div></div>
  </div>`);

  const list=m.querySelector('#m-list');
  function draw(){
    const members=store.members();
    list.innerHTML='';
    if(!members.length){ list.appendChild(el(`<div class="mnothing" style="padding:14px">No members yet.</div>`)); return; }
    members.forEach(mm=>{
      const row=el(`<div class="mledit">
        <span class="av" style="width:30px;height:30px;font-size:12px;background:${avatarColor(mm.id)}">${esc(initials(mm.name))}</span>
        <div class="mledit-in">
          <input value="${esc(mm.name)}" data-f="name" placeholder="Name">
          <input value="${esc(mm.role||'')}" data-f="role" placeholder="Role">
        </div>
        <button class="del" title="Remove">${xIcon(15)}</button>
      </div>`);
      row.querySelectorAll('input').forEach(inp=>{
        inp.onchange=()=>store.updateMember(mm.id,{[inp.dataset.f]:inp.value.trim()});
      });
      const delB=row.querySelector('.del'); let armed=false,t;
      delB.onclick=async()=>{
        if(!armed){armed=true;delB.classList.add('armed');delB.innerHTML='Remove?';
          t=setTimeout(()=>{armed=false;delB.classList.remove('armed');delB.innerHTML=xIcon(15);},3000);return;}
        clearTimeout(t);await store.deleteMember(mm.id);draw();
      };
      list.appendChild(row);
    });
  }
  draw();

  const nameI=m.querySelector('#m-name'), roleI=m.querySelector('#m-role');
  const add=async()=>{const n=nameI.value.trim();if(!n)return;await store.addMember({name:n,role:roleI.value.trim()});nameI.value='';roleI.value='';draw();nameI.focus();};
  m.querySelector('#m-add').onclick=add;
  nameI.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();add();}});
  roleI.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();add();}});

  m.querySelector('.x').onclick=closeModal;
  m.querySelector('#m-done').onclick=closeModal;
  mount.innerHTML='';mount.appendChild(m);scrim.classList.add('open');
  setTimeout(()=>nameI.focus(),40);
}

/* ----- standalone task modal ----- */
function openTask(id){
  const t={...store.task(id)};
  const m=el(`<div class="modal">
    <div class="modal-head"><h3>Edit task</h3><button class="x">${xIcon()}</button></div>
    <div class="modal-body">
      <div class="field"><label>Task</label><input id="t-text" value="${esc(t.t)}"></div>
      <div class="field"><label>Category</label>
        <select id="t-cat">${CATEGORIES.map(c=>`<option value="${c.key}" ${(t.cat||'general')===c.key?'selected':''}>${c.label}</option>`).join('')}</select>
      </div>
      <div class="row2">
        <div class="field"><label>Assigned to</label>
          <select id="t-owner">
            <option value="">Unassigned</option>
            ${store.members().map(mm=>`<option value="${mm.id}" ${t.owner===mm.id?'selected':''}>${esc(mm.name)}</option>`).join('')}
          </select>
        </div>
        <div class="field"><label>Due (optional)</label><input type="date" id="t-due" value="${t.due||''}"></div>
      </div>
      <label class="chk"><input type="checkbox" id="t-done" ${t.done?'checked':''}> Mark done</label>
    </div>
    <div class="modal-foot">
      <button class="link-del" id="t-del">Delete task</button>
      <div style="display:flex;gap:8px;margin-left:auto">
        <button class="btn btn-ghost" id="t-cancel">Cancel</button>
        <button class="btn btn-primary" id="t-save">Save</button>
      </div>
    </div>
  </div>`);
  m.querySelector('.x').onclick=closeModal;
  m.querySelector('#t-cancel').onclick=closeModal;
  { const db=m.querySelector('#t-del'); let armed=false,tm;
    db.onclick=()=>{ if(!armed){armed=true;db.textContent='Click again to delete';db.classList.add('armed');
      tm=setTimeout(()=>{armed=false;db.textContent='Delete task';db.classList.remove('armed');},3000);return;}
      clearTimeout(tm);store.deleteTask(id);closeModal(); }; }
  m.querySelector('#t-save').onclick=()=>{
    store.updateTask(id,{
      t:m.querySelector('#t-text').value.trim()||'Untitled task',
      cat:m.querySelector('#t-cat').value,
      owner:m.querySelector('#t-owner').value||null,
      due:m.querySelector('#t-due').value||null,
      done:m.querySelector('#t-done').checked,
    });
    closeModal();
  };
  mount.innerHTML='';mount.appendChild(m);scrim.classList.add('open');
  setTimeout(()=>m.querySelector('#t-text').focus(),40);
}

/* icons */
function plusIcon(){return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>`;}
function plusMini(){return `<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.6"><path d="M12 5v14M5 12h14"/></svg>`;}
function chev(d){return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="${d==='l'?'M15 18l-6-6 6-6':'M9 18l6-6-6-6'}"/></svg>`;}
function calIcon(){return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M3 10h18M8 2v4M16 2v4"/></svg>`;}
function peopleIcon(){return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="9" cy="8" r="3"/><path d="M3 20c0-3 2.5-5 6-5s6 2 6 5"/><circle cx="17" cy="9" r="2.2"/><path d="M15.5 14.5c2.5.4 4.5 2.3 4.5 5.5"/></svg>`;}
function checkIcon(){return `<svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6 9 17l-5-5"/></svg>`;}
function xIcon(sz=18){return `<svg viewBox="0 0 24 24" width="${sz}" height="${sz}" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>`;}
function esc(s){return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

/* toast */
function toast(msg){ const t=$('#toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove('show'),3200); }

/* auth gate */
const gate=$('#authgate');
function showLogin(){ gate.classList.add('open'); }
function hideLogin(){ gate.classList.remove('open'); }
function auMsg(s){ $('#au-msg').textContent=s||''; }

function setFooter(connected){
  const f=$('#sideFoot');
  if(!connected){ f.innerHTML='<b>Demo mode.</b> Not connected to Supabase — changes reset on reload. Add your project URL and key in the file to enable shared saving.'; return; }
  f.innerHTML='<div style="margin-bottom:8px">Shared live with your board.</div><button id="signout" style="color:#a6a9c4;font-weight:600;font-size:12px">Sign out</button>';
  $('#signout').onclick=()=>sb.auth.signOut();
}

function wireAuthUI(){
  const email=()=>$('#au-email').value.trim(), pass=()=>$('#au-pass').value;
  $('#au-signin').onclick=async()=>{ auMsg('Signing in…');
    const {error}=await sb.auth.signInWithPassword({email:email(),password:pass()});
    auMsg(error?error.message:''); };
  $('#au-signup').onclick=async()=>{ auMsg('Creating account…');
    const {error}=await sb.auth.signUp({email:email(),password:pass()});
    auMsg(error?error.message:'Account created. If email confirmation is on, confirm via the link, then sign in.'); };
  $('#au-pass').addEventListener('keydown',e=>{ if(e.key==='Enter') $('#au-signin').click(); });
}

let _appStarted=false;
async function startApp(){
  hideLogin(); setFooter(true);
  if(!_appStarted){ _appStarted=true; subscribeRealtime(); }
  await loadAll();
  calDate=new Date(2026,9,1);
  render();
}

async function boot(){
  if(!CONNECTED){                    // no Supabase keys yet — empty, nothing saved
    setFooter(false); calDate=new Date(2026,9,1); render();
    toast('Not connected — add your Supabase URL and key to save data');
    return;
  }
  if(!window.supabase){ toast('Could not load Supabase library'); return; }
  sb=window.supabase.createClient(CONFIG.url,CONFIG.key);
  wireAuthUI();
  sb.auth.onAuthStateChange((_e,session)=>{ if(session) startApp(); else { _appStarted=false; showLogin(); } });
  const {data:{session}}=await sb.auth.getSession();
  if(session) startApp(); else showLogin();
}
boot();
</script>
